name: Publish release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish (for example, v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Validate tag version
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          expected="v$(node -p "require('./package.json').version")"
          test "$RELEASE_TAG" = "$expected"
      - run: npm ci
      - run: npm run check
      - name: Check npm version
        id: npm_version
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - run: npm publish --access public --provenance
        if: steps.npm_version.outputs.published != 'true'

  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
          RELEASE_TARGET: ${{ github.sha }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            exit 0
          fi
          gh release create "$RELEASE_TAG" --target "$RELEASE_TARGET" --title "$RELEASE_TAG" --generate-notes
